services:
  # Main Api Gateway Service
  api-gateway:
    image: nginx:alpine
    container_name: api-gateway
    ports:
      - "80:80"
    volumes:
      # Mount your template file into Nginx's automated template folder
      - ./default.conf.template:/etc/nginx/templates/default.conf.template:ro
    env_file: 
      - .env  
    environment:
      - NGINX_ENVSUBST_FILTER=^PRIVATE_IP_

    restart: always

  # Prometheus Time-Series Database
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    # It runs on port 9090 natively. No need to expose it to the host machine ports 
    # because Grafana will talk to it internally via the Docker network.
    restart: always

  # Grafana Visualization Dashboard
  grafana:
    image: grafana/grafana:11.3.0
    container_name: grafana
    ports:
      - "3000:3000" # Expose to host so you can access the UI
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
    restart: always

volumes:
  prometheus_data:
  grafana_data: