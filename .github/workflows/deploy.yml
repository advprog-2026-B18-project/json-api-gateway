name: Deploy Nginx API Gateway

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Dynamically generate the .env and prometheus.yml files using GitHub Secrets safely
      - name: Generate Config Files
        env:
          PRIVATE_IP_AUTH: ${{ secrets.PRIVATE_IP_AUTH }}
          PRIVATE_IP_ORDER: ${{ secrets.PRIVATE_IP_ORDER }}
          PRIVATE_IP_PAYMENT: ${{ secrets.PRIVATE_IP_PAYMENT }}
          PRIVATE_IP_INVENTORY: ${{ secrets.PRIVATE_IP_INVENTORY }}
          GF_SECURITY_ADMIN_PASSWORD: ${{ secrets.GF_SECURITY_ADMIN_PASSWORD }}
        run: |
          # Generate the .env file
          echo "PRIVATE_IP_AUTH=$PRIVATE_IP_AUTH" >> .env
          echo "PRIVATE_IP_ORDER=$PRIVATE_IP_ORDER" >> .env
          echo "PRIVATE_IP_PAYMENT=$PRIVATE_IP_PAYMENT" >> .env
          echo "PRIVATE_IP_INVENTORY=$PRIVATE_IP_INVENTORY" >> .env
          echo "GF_SECURITY_ADMIN_PASSWORD=$GF_SECURITY_ADMIN_PASSWORD" >> .env
          
          # Generate prometheus.yml from template using envsubst
          envsubst < prometheus.yml.template > prometheus.yml

      # Securely copy the infrastructure files AND the newly created .env
      - name: Copy files via scp
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          # Notice we are copying the template file, not a static conf
          source: "docker-compose.yml,default.conf.template,.env,prometheus.yml,provisioning"
          target: "/home/ubuntu/"

      # Connect to EC2, lock permissions, and deploy
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Pull the latest official Nginx Alpine image
            docker pull nginx:alpine
            
            # Lock down the .env file so only the ubuntu user can read it
            chmod 600 /home/ubuntu/.env
            
            # Restart the container. --force-recreate ensures Nginx re-reads the 
            # .env file and regenerates the template if any private IPs changed.
            docker compose -f /home/ubuntu/docker-compose.yml up -d --force-recreate
            
            # Clean up old images
            docker image prune -af